name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: Got an idea? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that snip doesn't support today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
